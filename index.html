<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 小游戏 - 完整版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="header-left">
                <h1 class="title">2048</h1>
                <div class="difficulty-selector">
                    <label for="difficulty">难度：</label>
                    <select id="difficulty" class="difficulty-select">
                        <option value="easy">简单 (5×5)</option>
                        <option value="normal" selected>普通 (4×4)</option>
                        <option value="hard">困难 (3×3)</option>
                    </select>
                </div>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div id="score" class="score-value">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div id="best-score" class="score-value">0</div>
                </div>
            </div>
        </div>

        <div class="instructions">
            <p>使用 <strong>↑ ↓ ← →</strong> 方向键或触摸滑动移动方块</p>
            <p>相同数字的方块碰撞时会合并成它们的和</p>
            <p>达到 <strong>2048</strong> 即为胜利！</p>
        </div>

        <div class="game-controls">
            <button id="start-btn" class="control-btn start-btn">开始游戏</button>
            <button id="pause-btn" class="control-btn pause-btn" disabled>暂停游戏</button>
            <button id="restart-btn" class="control-btn restart-btn">重新开始</button>
            <button id="leaderboard-btn" class="control-btn leaderboard-btn">排行榜</button>
        </div>

        <div class="game-board-wrapper">
            <div id="score-popup-container" class="score-popup-container"></div>
            <div class="game-board" id="game-board">
            </div>
        </div>

        <div id="game-over" class="game-over">
            <div class="game-over-content">
                <h2 id="game-over-title"></h2>
                <p>最终得分: <span id="final-score"></span></p>
                <button id="play-again-btn" class="play-again-btn">再来一局</button>
            </div>
        </div>

        <div id="leaderboard-modal" class="leaderboard-modal">
            <div class="leaderboard-content">
                <div class="leaderboard-header">
                    <h2>🏆 本地排行榜</h2>
                    <button id="close-leaderboard" class="close-btn">×</button>
                </div>
                <div class="leaderboard-info">
                    <p>总局数: <span id="total-games">0</span> 场</p>
                </div>
                <div class="leaderboard-list">
                    <div class="leaderboard-item header-item">
                        <span>排名</span>
                        <span>分数</span>
                        <span>难度</span>
                        <span>日期</span>
                    </div>
                    <div id="leaderboard-records" class="leaderboard-records">
                    </div>
                </div>
                <div class="leaderboard-actions">
                    <button id="clear-leaderboard" class="clear-btn">清空记录</button>
                </div>
            </div>
        </div>

        <div id="pause-overlay" class="pause-overlay">
            <div class="pause-content">
                <h2>⏸️ 游戏暂停</h2>
                <p>点击下方按钮继续游戏</p>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
